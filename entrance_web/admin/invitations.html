<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>入学测试 · 邀请管理</title>
<script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50 min-h-screen">
<div class="max-w-6xl mx-auto p-4 md:p-8">

  <header class="flex items-center justify-between mb-6">
    <div class="flex items-center gap-3">
      <img src="../assets/logo.png" class="h-10">
      <div>
        <div class="font-bold text-teal-700">入学测试 · 邀请管理</div>
        <div class="text-xs text-gray-500">Sage Path · 睿然国际教育</div>
      </div>
    </div>
    <div class="flex gap-3 text-sm">
      <a href="papers.html" class="text-teal-600 hover:underline">题库管理</a>
      <a href="/" class="text-gray-600 hover:underline">返回后台</a>
    </div>
  </header>

  <div id="auth-error" class="hidden bg-red-50 border-l-4 border-red-500 p-4 text-red-700 rounded mb-4"></div>

  <!-- Create form -->
  <div class="bg-white rounded-xl shadow p-6 mb-6">
    <h2 class="text-lg font-bold text-gray-800 mb-4">📤 生成新的测试邀请</h2>
    <form id="create-form" class="grid grid-cols-1 md:grid-cols-3 gap-4">
      <div>
        <label class="block text-sm text-gray-600 mb-1">学生姓名 *</label>
        <input name="student_name" required class="w-full border border-gray-300 rounded px-3 py-2">
      </div>
      <div>
        <label class="block text-sm text-gray-600 mb-1">年龄</label>
        <input name="student_age" type="number" min="5" max="60" class="w-full border border-gray-300 rounded px-3 py-2">
      </div>
      <div>
        <label class="block text-sm text-gray-600 mb-1">年级</label>
        <input name="student_grade" class="w-full border border-gray-300 rounded px-3 py-2" placeholder="高一 / 初三 …">
      </div>
      <div>
        <label class="block text-sm text-gray-600 mb-1">联系电话</label>
        <input name="student_phone" class="w-full border border-gray-300 rounded px-3 py-2">
      </div>
      <div>
        <label class="block text-sm text-gray-600 mb-1">目标考试 *</label>
        <select name="target_exam" required class="w-full border border-gray-300 rounded px-3 py-2">
          <option value="ielts">IELTS 雅思</option>
          <option value="toefl">TOEFL 托福</option>
          <option value="toefl_junior">TOEFL Junior 小托福</option>
        </select>
      </div>
      <div>
        <label class="block text-sm text-gray-600 mb-1">是否系统学习过目标考试</label>
        <select name="has_studied_target" class="w-full border border-gray-300 rounded px-3 py-2">
          <option value="false">否（推荐通用英语诊断）</option>
          <option value="true">是（推荐专项诊断）</option>
        </select>
      </div>
      <div class="md:col-span-2">
        <label class="block text-sm text-gray-600 mb-1">测试试卷 *</label>
        <select name="paper_id" id="paper-select" required class="w-full border border-gray-300 rounded px-3 py-2">
          <option value="">加载中...</option>
        </select>
      </div>
      <div class="flex items-end">
        <button type="submit" class="w-full bg-teal-600 hover:bg-teal-700 text-white font-bold py-2 rounded">生成测试链接</button>
      </div>
    </form>
    <div id="create-result" class="hidden mt-4 bg-teal-50 border-l-4 border-teal-500 p-4 rounded">
      <p class="text-sm text-gray-700 mb-2">✅ 已生成专属测试链接，请复制发送给学生：</p>
      <div class="flex gap-2">
        <input id="result-link" readonly class="flex-1 border border-gray-300 rounded px-3 py-2 bg-white text-sm">
        <button id="copy-btn" class="bg-teal-600 hover:bg-teal-700 text-white px-4 rounded text-sm">复制</button>
      </div>
    </div>
  </div>

  <!-- List -->
  <div class="bg-white rounded-xl shadow p-6">
    <div class="flex items-center justify-between mb-4">
      <h2 class="text-lg font-bold text-gray-800">📋 邀请列表</h2>
      <select id="filter-status" class="border border-gray-300 rounded px-3 py-1 text-sm">
        <option value="">全部状态</option>
        <option value="pending">待开始</option>
        <option value="in_progress">答题中</option>
        <option value="submitted">待批改</option>
        <option value="graded">已批改</option>
      </select>
    </div>
    <div class="overflow-x-auto">
      <table class="w-full text-sm">
        <thead>
          <tr class="bg-gray-50 text-gray-600 text-left">
            <th class="p-3">学生</th>
            <th class="p-3">试卷</th>
            <th class="p-3">状态</th>
            <th class="p-3">创建时间</th>
            <th class="p-3">提交时间</th>
            <th class="p-3">操作</th>
          </tr>
        </thead>
        <tbody id="invite-list"><tr><td colspan="6" class="p-8 text-center text-gray-400">加载中...</td></tr></tbody>
      </table>
    </div>
  </div>

</div>

<script src="../assets/admin.js"></script>
<script>initInvitationsPage();</script>
</body>
</html>
