<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>入学英语水平测试</title>
<script src="https://cdn.tailwindcss.com"></script>
<style>
  .q-card { transition: all 0.2s; }
  .q-card:hover { box-shadow: 0 4px 12px rgba(13,148,136,0.08); }
  textarea { font-family: inherit; }
</style>
</head>
<body class="bg-gradient-to-br from-teal-50 to-white min-h-screen">
<div class="max-w-4xl mx-auto p-4 md:p-8">

  <header class="flex items-center justify-between mb-6">
    <div class="flex items-center gap-3">
      <img src="assets/logo.png" class="h-12">
      <div>
        <div class="font-bold text-teal-700">Sage Path · 睿然国际教育</div>
        <div class="text-xs text-gray-500">入学英语水平测试</div>
      </div>
    </div>
    <div id="timer" class="text-sm text-gray-600 hidden">
      建议用时：<span id="duration-total"></span> 分钟
    </div>
  </header>

  <div id="loading" class="bg-white rounded-xl shadow p-8 text-center text-gray-500">
    正在加载测试...
  </div>

  <div id="error-box" class="hidden bg-red-50 border-l-4 border-red-500 p-6 rounded text-red-700"></div>

  <!-- Welcome -->
  <div id="welcome" class="hidden bg-white rounded-2xl shadow-lg p-8 md:p-10">
    <h1 class="text-2xl md:text-3xl font-bold text-teal-700 mb-4">欢迎参加入学英语测试</h1>
    <p class="text-gray-600 mb-6">同学您好，请确认以下信息后开始测试：</p>
    <div id="welcome-info" class="bg-teal-50 rounded-lg p-5 mb-6 space-y-2 text-sm"></div>
    <div class="bg-yellow-50 border-l-4 border-yellow-400 p-4 text-sm text-gray-700 mb-6">
      <p class="font-semibold mb-1">📌 答题须知：</p>
      <ul class="list-disc pl-5 space-y-1">
        <li>测试包含听力、阅读、写作三个部分，建议用时约 <b id="duration-note"></b> 分钟。</li>
        <li>听力音频每题只播放一次，请集中注意力。</li>
        <li>提交后不可修改，请确认答案后再提交。</li>
        <li>本测试不强制计时，请尽力完成。</li>
      </ul>
    </div>
    <button id="btn-start" class="w-full bg-teal-600 hover:bg-teal-700 text-white font-bold py-3 rounded-lg shadow">
      开始测试
    </button>
  </div>

  <!-- Exam form -->
  <form id="exam-form" class="hidden space-y-6"></form>

  <div id="exam-footer" class="hidden mt-6">
    <button id="btn-submit" class="w-full bg-teal-600 hover:bg-teal-700 text-white font-bold py-3 rounded-lg shadow">
      提交测试
    </button>
  </div>

  <!-- Done -->
  <div id="done" class="hidden bg-white rounded-2xl shadow-lg p-10 text-center">
    <div class="text-5xl mb-4">✅</div>
    <h2 class="text-2xl font-bold text-teal-700 mb-3">测试已提交</h2>
    <p class="text-gray-600 mb-2">感谢您的参与！</p>
    <p class="text-gray-500 text-sm">我们的老师会在核对后为您出具正式诊断报告。</p>
  </div>

</div>

<script src="assets/student.js"></script>
</body>
</html>
