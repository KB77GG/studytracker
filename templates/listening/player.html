<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>精听练习</title>
<style>
:root {
  --bg: #f3eee6;
  --sidebar-bg: #171a1e;
  --sidebar-panel: #20242a;
  --sidebar-text: #c8c1b7;
  --sidebar-muted: #8d867d;
  --panel-bg: #fbf8f1;
  --reader-bg: #fffdf8;
  --surface: #fffaf2;
  --surface-muted: #f6f0e7;
  --text: #25211c;
  --text-muted: #746b60;
  --border: #e3d9cb;
  --border-strong: #cfc2b1;
  --accent: #2f8e87;
  --accent-hover: #267873;
  --accent-soft: #e1f3ef;
  --audio-accent: #5b6ee1;
  --audio-soft: #e7e9fb;
  --success: #2f8a5f;
  --warning: #b87317;
  --danger: #c34a3e;
  --shadow-soft: 0 18px 50px rgba(62, 50, 34, 0.08);
  --shadow-control: 0 1px 2px rgba(35, 29, 22, 0.08);
  --radius: 10px;
}

* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  font-family: ui-sans-serif, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", sans-serif;
  background:
    radial-gradient(circle at top left, rgba(47, 142, 135, 0.12), transparent 32rem),
    linear-gradient(135deg, #f7f1e8 0%, var(--bg) 55%, #eee8de 100%);
  color: var(--text);
  height: 100vh;
  overflow: hidden;
  -webkit-font-smoothing: antialiased;
}

/* Layout */
.app { display: flex; height: 100vh; }

/* Sidebar */
.sidebar {
  width: 268px;
  background: var(--sidebar-bg);
  color: var(--sidebar-text);
  display: flex;
  flex-direction: column;
  flex-shrink: 0;
  overflow: hidden;
  border-right: 1px solid rgba(255,255,255,0.08);
}

.sidebar-header {
  padding: 20px 18px 16px;
  border-bottom: 1px solid rgba(255,255,255,0.1);
}

.sidebar-header h2 {
  font-size: 15px;
  color: #fff;
  margin-bottom: 6px;
  line-height: 1.4;
  font-weight: 650;
}

.sidebar-header .subtitle {
  font-size: 12px;
  color: var(--sidebar-muted);
  line-height: 1.55;
}

.part-tabs {
  display: flex;
  padding: 12px 14px 8px;
  gap: 6px;
}

.part-tab {
  padding: 7px 13px;
  border-radius: 999px;
  font-size: 13px;
  font-weight: 600;
  cursor: pointer;
  border: 1px solid rgba(255,255,255,0.08);
  background: rgba(255,255,255,0.06);
  color: var(--sidebar-text);
  transition: all 0.2s;
}

.part-tab.active {
  background: #f7efe2;
  border-color: #f7efe2;
  color: #171a1e;
}

.sentence-list {
  flex: 1;
  overflow-y: auto;
  padding: 8px 10px 16px;
}

.sentence-list::-webkit-scrollbar { width: 4px; }
.sentence-list::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.22); border-radius: 2px; }

.sentence-item {
  display: flex;
  align-items: center;
  padding: 11px 12px;
  border-radius: 10px;
  cursor: pointer;
  font-size: 13px;
  transition: all 0.15s;
  gap: 8px;
  border: 1px solid transparent;
  margin-bottom: 4px;
}

.sentence-item:hover { background: rgba(255,255,255,0.07); }

.sentence-item.active {
  background: linear-gradient(135deg, rgba(47,142,135,0.2), rgba(91,110,225,0.18));
  border-color: rgba(255,255,255,0.12);
  color: #fff;
  box-shadow: inset 3px 0 0 var(--accent);
}

.sentence-item.completed .sent-status {
  color: var(--success);
}

.sent-label { flex: 1; }
.sent-dur {
  font-size: 11px;
  opacity: 0.78;
  font-variant-numeric: tabular-nums;
  padding: 2px 6px;
  border-radius: 999px;
  background: rgba(255,255,255,0.06);
}
.sent-status { width: 16px; font-size: 13px; color: var(--sidebar-muted); }

/* Main Panel */
.main {
  flex: 1;
  display: flex;
  flex-direction: column;
  overflow: hidden;
}

/* Top Bar */
.topbar {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 14px 28px;
  background: rgba(251, 248, 241, 0.92);
  backdrop-filter: blur(14px);
  border-bottom: 1px solid var(--border);
}

.topbar-title {
  font-size: 15px;
  font-weight: 650;
  color: #342d25;
}

.topbar-actions {
  display: flex;
  gap: 8px;
  align-items: center;
}

.back-link {
  color: var(--text-muted);
  text-decoration: none;
  font-size: 14px;
  padding: 7px 10px;
  border-radius: 8px;
  transition: background 0.15s ease, color 0.15s ease;
}

.back-link:hover { background: var(--surface-muted); color: var(--text); }

/* Progress Bar */
.progress-bar-container {
  padding: 14px 28px;
  background: var(--panel-bg);
  border-bottom: 1px solid var(--border);
}

.audio-progress {
  display: flex;
  align-items: center;
  gap: 12px;
}

.time-display {
  font-size: 12px;
  color: var(--text-muted);
  font-variant-numeric: tabular-nums;
  min-width: 45px;
  font-weight: 600;
}

.progress-track {
  flex: 1;
  height: 12px;
  background:
    repeating-linear-gradient(90deg, rgba(91,110,225,0.12) 0 2px, transparent 2px 8px),
    var(--surface-muted);
  border: 1px solid var(--border);
  border-radius: 999px;
  cursor: pointer;
  position: relative;
  overflow: hidden;
}

.progress-fill {
  height: 100%;
  background: linear-gradient(90deg, var(--accent), var(--audio-accent));
  border-radius: 999px;
  transition: width 0.1s;
  position: relative;
}

.progress-fill::after {
  content: '';
  position: absolute;
  right: -6px;
  top: -4px;
  width: 16px;
  height: 16px;
  background: var(--audio-accent);
  border-radius: 50%;
  border: 2px solid var(--reader-bg);
  box-shadow: 0 3px 10px rgba(91,110,225,0.28);
  opacity: 0;
  transition: opacity 0.2s;
}

.progress-track:hover .progress-fill::after { opacity: 1; }

/* Sentence markers on progress bar */
.progress-marker {
  position: absolute;
  top: 0;
  width: 1px;
  height: 100%;
  background: rgba(0,0,0,0.15);
}

/* Mode Tabs */
.mode-section {
  padding: 14px 28px;
  background: var(--panel-bg);
  border-bottom: 1px solid var(--border);
  display: flex;
  align-items: center;
  gap: 12px;
  flex-wrap: wrap;
}

.mode-label { font-size: 13px; color: var(--text-muted); font-weight: 600; }

.mode-tabs {
  display: flex;
  gap: 4px;
  padding: 3px;
  border: 1px solid var(--border);
  background: var(--surface-muted);
  border-radius: 999px;
}

.mode-tab {
  padding: 7px 15px;
  border: 1px solid transparent;
  border-radius: 999px;
  font-size: 13px;
  cursor: pointer;
  background: transparent;
  color: var(--text);
  transition: all 0.2s;
  font-weight: 600;
}

.mode-tab.active {
  background: var(--reader-bg);
  color: var(--accent-hover);
  border-color: rgba(47,142,135,0.18);
  box-shadow: var(--shadow-control);
}

.mode-tab:hover:not(.active) { color: var(--accent); }

/* Controls */
.controls {
  padding: 14px 28px;
  background: var(--panel-bg);
  border-bottom: 1px solid var(--border);
  display: flex;
  align-items: center;
  justify-content: space-between;
  flex-wrap: wrap;
  gap: 8px;
  position: relative;
  z-index: 2;
}

.ctrl-group {
  display: flex;
  align-items: center;
  gap: 6px;
}

.ctrl-btn {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  gap: 4px;
  padding: 8px 13px;
  border: 1px solid var(--border);
  border-radius: 9px;
  background: var(--reader-bg);
  color: var(--text);
  font-size: 13px;
  cursor: pointer;
  transition: all 0.15s;
  white-space: nowrap;
  box-shadow: var(--shadow-control);
  font-weight: 600;
}

.ctrl-btn:hover {
  border-color: rgba(47,142,135,0.42);
  color: var(--accent-hover);
  background: #fff;
}

.ctrl-btn.primary {
  background: linear-gradient(135deg, var(--accent), var(--audio-accent));
  color: #fff;
  border-color: transparent;
  min-width: 48px;
  min-height: 38px;
}

.ctrl-btn.primary:hover { color: #fff; filter: brightness(0.96); }

.ctrl-btn svg { width: 16px; height: 16px; }

.speed-select {
  padding: 8px 12px;
  border: 1px solid var(--border);
  border-radius: 9px;
  font-size: 13px;
  background: var(--reader-bg);
  cursor: pointer;
  color: var(--text);
  font-weight: 600;
}

.ctrl-inline-label {
  font-size: 12px;
  color: var(--text-muted);
  margin-right: 2px;
}

.toggle-group { display: flex; gap: 4px; }

.toggle-btn {
  padding: 8px 13px;
  border: 1px solid var(--border);
  border-radius: 9px;
  background: var(--reader-bg);
  font-size: 13px;
  cursor: pointer;
  color: var(--text-muted);
  transition: all 0.15s;
  box-shadow: var(--shadow-control);
  font-weight: 600;
}

.toggle-btn.on {
  background: var(--accent-soft);
  border-color: var(--accent);
  color: var(--accent);
}

/* Content Area */
.content-area {
  flex: 1;
  overflow-y: auto;
  padding: 48px 28px 56px;
  display: flex;
  justify-content: center;
  align-items: flex-start;
  background:
    linear-gradient(90deg, rgba(227,217,203,0.32) 1px, transparent 1px) 0 0 / 42px 42px,
    var(--bg);
}

.dictation-box {
  max-width: 860px;
  width: 100%;
  min-height: 248px;
  background: var(--reader-bg);
  border: 1px solid rgba(207,194,177,0.78);
  border-radius: 16px;
  padding: 40px 40px 32px;
  margin-bottom: 30px;
  box-shadow: var(--shadow-soft);
}

/* Sentence display */
.sentence-display {
  font-size: 20px;
  line-height: 2;
  margin-bottom: 24px;
  min-height: 100px;
}

/* Dictation input area */
.dictation-area {
  font-family: Georgia, "Times New Roman", "Songti SC", "SimSun", serif;
  font-size: 21px;
  line-height: 2.05;
  word-spacing: 5px;
  color: #2c261f;
  min-height: 148px;
  padding: 10px 6px 28px;
  overflow-wrap: anywhere;
}

.dictation-area .word-slot {
  display: inline-flex;
  align-items: flex-end;
  justify-content: center;
  min-width: 64px;
  min-height: 38px;
  border-bottom: 2px solid var(--border-strong);
  text-align: center;
  margin: 0 3px 8px;
  padding: 0 5px 3px;
  transition: border-color 0.2s;
  vertical-align: baseline;
  background: linear-gradient(180deg, transparent 62%, rgba(91,110,225,0.08) 0);
}

.dictation-area .word-slot:focus-within {
  border-color: var(--accent);
}

.dictation-area .word-visible {
  display: inline;
  margin: 0 2px;
}

.dictation-area input {
  border: none;
  outline: none;
  font-family: ui-sans-serif, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "PingFang SC", "Hiragino Sans GB", sans-serif;
  font-size: 18px;
  text-align: center;
  width: 100%;
  height: 30px;
  line-height: 30px;
  background: transparent;
  color: var(--audio-accent);
  font-weight: 650;
}

.dictation-area input.correct {
  color: var(--success);
}

.dictation-area input.incorrect {
  color: var(--danger);
}

/* 原文 / 译文显示 */
.original-text {
  font-family: Georgia, "Times New Roman", "Songti SC", "SimSun", serif;
  font-size: 19px;
  line-height: 1.95;
  color: var(--text);
  margin-top: 22px;
  margin-bottom: 12px;
  padding: 18px 20px;
  background: #fbf3df;
  border-left: 3px solid #d9a44a;
  border-radius: 10px;
  display: none;
}

.translation-text {
  font-size: 15px;
  color: var(--text-muted);
  line-height: 1.75;
  margin-top: 12px;
  padding: 14px 18px;
  background: var(--surface-muted);
  border: 1px solid var(--border);
  border-radius: 10px;
  display: none;
}

.original-text.visible, .translation-text.visible { display: block; }

/* Score bar */
.score-bar {
  margin-top: 24px;
  padding: 16px 18px;
  background: linear-gradient(135deg, var(--accent-soft), var(--audio-soft));
  border: 1px solid rgba(47,142,135,0.18);
  border-radius: 12px;
  display: flex;
  align-items: center;
  gap: 16px;
  font-size: 14px;
}

.score-bar .score {
  font-size: 24px;
  font-weight: 700;
  color: var(--accent);
}

.score-bar .score-label { color: var(--text-muted); }

/* Error summary box */
.error-summary-box {
  margin-top: 18px;
  padding: 16px 18px;
  background: #fff8e9;
  border: 1px solid #ead4a8;
  border-radius: 12px;
}

.error-summary-box .esb-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 8px;
}

.error-summary-box .esb-title {
  font-size: 14px;
  font-weight: 600;
  color: #7b5519;
  display: flex;
  align-items: center;
  gap: 6px;
}

.error-summary-box .esb-status {
  font-size: 12px;
  color: var(--text-muted);
  transition: color 0.2s;
}

.error-summary-box .esb-status.saved { color: var(--success); }
.error-summary-box .esb-status.dirty { color: var(--warning); }

.error-summary-box textarea {
  width: 100%;
  min-height: 72px;
  padding: 11px 12px;
  border: 1px solid #e8d1a0;
  border-radius: 9px;
  font-family: inherit;
  font-size: 14px;
  line-height: 1.6;
  resize: vertical;
  background: #fffdf8;
  color: var(--text);
  outline: none;
  transition: border-color 0.15s;
}

.error-summary-box textarea:focus { border-color: #f59e0b; }

.error-summary-box .esb-hint {
  margin-top: 6px;
  font-size: 12px;
  color: var(--text-muted);
}

/* Keyboard shortcuts help */
.shortcuts-help {
  padding: 10px 28px;
  background: #eee7dc;
  border-top: 1px solid var(--border);
  font-size: 12px;
  color: var(--text-muted);
  display: flex;
  flex-wrap: wrap;
  gap: 16px;
}

.shortcuts-help kbd {
  display: inline-block;
  padding: 2px 6px;
  background: var(--reader-bg);
  border: 1px solid var(--border);
  border-radius: 5px;
  font-family: inherit;
  font-size: 11px;
  color: var(--text);
}

/* Difficulty slider */
.difficulty-section {
  padding: 12px 28px;
  background: var(--panel-bg);
  border-bottom: 1px solid var(--border);
  display: flex;
  align-items: center;
  gap: 16px;
}

.difficulty-slider-wrap {
  flex: 1;
  max-width: 320px;
}

.difficulty-slider {
  width: 100%;
  height: 8px;
  -webkit-appearance: none;
  appearance: none;
  background: var(--surface-muted);
  border: 1px solid var(--border);
  border-radius: 999px;
  outline: none;
  margin-bottom: 4px;
}

.difficulty-slider::-webkit-slider-thumb {
  -webkit-appearance: none;
  width: 18px;
  height: 18px;
  border-radius: 50%;
  background: var(--audio-accent);
  cursor: pointer;
  border: 2px solid var(--reader-bg);
  box-shadow: 0 3px 10px rgba(91,110,225,0.22);
}

.difficulty-labels {
  display: flex;
  justify-content: space-between;
  font-size: 11px;
  color: var(--text-muted);
  text-align: center;
  line-height: 1.3;
}

.difficulty-labels span.active {
  color: var(--accent);
  font-weight: 600;
}

/* Mobile */
@media (max-width: 768px) {
  .sidebar { width: 100%; height: auto; max-height: 200px; }
  .app { flex-direction: column; }
  .sentence-list { display: flex; overflow-x: auto; overflow-y: hidden; padding: 8px; gap: 4px; }
  .sentence-item { white-space: nowrap; padding: 8px 12px; }
  .controls { justify-content: center; }
  .topbar, .progress-bar-container, .mode-section, .controls, .shortcuts-help { padding-left: 16px; padding-right: 16px; }
  .content-area { padding: 36px 14px 44px; }
  .dictation-box { min-height: 214px; padding: 34px 18px 28px; border-radius: 12px; margin-bottom: 28px; }
  .dictation-area { font-size: 19px; line-height: 1.95; min-height: 142px; padding: 8px 2px 28px; }
  .dictation-area .word-slot { min-width: 54px; min-height: 34px; margin-bottom: 7px; }
}
</style>
</head>
<body>

<div class="app">
  <!-- Sidebar -->
  <aside class="sidebar">
    <div class="sidebar-header">
      <h2 id="exerciseTitle">精听练习</h2>
      <div class="subtitle" id="exerciseSubtitle"></div>
    </div>
    <div class="part-tabs" id="partTabs"></div>
    <div class="sentence-list" id="sentenceList"></div>
  </aside>

  <!-- Main -->
  <div class="main">
    <!-- Top bar -->
    <div class="topbar">
      <div class="topbar-title" id="currentSentenceLabel">第1句</div>
      <div class="topbar-actions">
        <button class="ctrl-btn" id="btnResetFreeProgress" type="button" style="display:none">重置本地进度</button>
        <a class="back-link" href="{{ url_for('listening_index') }}">返回列表</a>
      </div>
    </div>

    <!-- Audio progress -->
    <div class="progress-bar-container">
      <div class="audio-progress">
        <span class="time-display" id="currentTime">00:00</span>
        <div class="progress-track" id="progressTrack">
          <div class="progress-fill" id="progressFill" style="width:0%"></div>
        </div>
        <span class="time-display" id="totalTime">00:00</span>
      </div>
    </div>

    <!-- Mode tabs -->
    <div class="mode-section">
      <span class="mode-label">练习模式：</span>
      <div class="mode-tabs">
        <button class="mode-tab active" data-mode="sentence">句子精听</button>
        <button class="mode-tab" data-mode="dictation">听写模式</button>
      </div>
    </div>

    <!-- Controls -->
    <div class="controls">
      <div class="ctrl-group">
        <button class="ctrl-btn primary" id="btnPlay" title="播放/暂停 (空格)">
          <svg id="iconPlay" viewBox="0 0 24 24" fill="currentColor"><polygon points="5,3 19,12 5,21"/></svg>
          <svg id="iconPause" viewBox="0 0 24 24" fill="currentColor" style="display:none"><rect x="5" y="3" width="4" height="18"/><rect x="15" y="3" width="4" height="18"/></svg>
        </button>
        <button class="ctrl-btn" id="btnPrev" title="上一句 ( [ )">◁ 上一句</button>
        <button class="ctrl-btn" id="btnNext" title="下一句 ( ] )">下一句 ▷</button>
        <button class="ctrl-btn" id="btnRepeat" title="重播当前句 (R)">↻ 当前句</button>
      </div>
      <div class="ctrl-group">
        <button class="ctrl-btn" id="btnBack5" title="后退5s ( < )">◁ 5s</button>
        <button class="ctrl-btn" id="btnFwd5" title="前进5s ( > )">5s ▷</button>
        <select class="speed-select" id="speedSelect" title="播放速度">
          <option value="0.5">0.5x</option>
          <option value="0.75">0.75x</option>
          <option value="1" selected>1.0x</option>
          <option value="1.25">1.25x</option>
          <option value="1.5">1.5x</option>
          <option value="2">2.0x</option>
        </select>
      </div>
      <div class="ctrl-group">
        <span class="ctrl-inline-label">自动播放</span>
        <select class="speed-select" id="repeatCountSelect" title="播放次数">
          <option value="1" selected>1次</option>
          <option value="3">3次</option>
          <option value="5">5次</option>
        </select>
        <select class="speed-select" id="repeatGapSelect" title="间隔时间">
          <option value="2" selected>间隔2s</option>
          <option value="5">间隔5s</option>
          <option value="10">间隔10s</option>
        </select>
      </div>
      <div class="toggle-group">
        <button class="toggle-btn" id="btnShowText" title="显示原文 ( - )">显示原文</button>
        <button class="toggle-btn" id="btnShowTrans" title="显示译文 ( = )">显示译文</button>
      </div>
    </div>

    <!-- Content -->
    <div class="content-area">
      <div class="dictation-box">
        <div class="dictation-area" id="dictationArea"></div>
        <div class="original-text" id="originalText"></div>
        <div class="translation-text" id="translationText"></div>
        <div class="score-bar" id="scoreBar" style="display:none">
          <div><span class="score" id="scoreValue">0</span><span>%</span></div>
          <div class="score-label" id="scoreDetail">0/0 词正确</div>
          <button class="ctrl-btn" id="btnRetry">重做本句</button>
          <button class="ctrl-btn" id="btnNextAfterScore">下一句 ▷</button>
        </div>
        <div class="error-summary-box" id="errorSummaryBox">
          <div class="esb-header">
            <div class="esb-title">本句错因总结</div>
            <span class="esb-status" id="errorSummaryStatus"></span>
          </div>
          <textarea id="errorSummaryInput" placeholder="例：连读没听出来 / 单词不认识 / 数字混淆 / 同义替换没反应过来 ..."></textarea>
          <div class="esb-hint">自动按句保存到本地浏览器（每句独立）。Ctrl+S 立即保存。</div>
        </div>
      </div>
    </div>

    <!-- Shortcuts -->
    <div class="shortcuts-help">
      <span><kbd>空格</kbd> 播放/暂停</span>
      <span><kbd>[</kbd> 上一句</span>
      <span><kbd>]</kbd> 下一句</span>
      <span><kbd>R</kbd> 重播</span>
      <span><kbd>&lt;</kbd> 后退5s</span>
      <span><kbd>&gt;</kbd> 前进5s</span>
      <span><kbd>-</kbd> 原文</span>
      <span><kbd>=</kbd> 译文</span>
      <span><kbd>Enter</kbd> 提交听写</span>
    </div>
  </div>
</div>

<audio id="audio" preload="auto"></audio>

<script>
(function() {
  // ── State ──
  let data = null;
  let currentPartIdx = 0;
  let currentSegIdx = 0;
  let mode = 'sentence';  // sentence | dictation
  let isPlaying = false;
  let showOriginal = false;
  let showTranslation = false;
  let completedSegs = new Set();
  let freeProgress = {};
  let sentenceLoopActive = false;
  let repeatCount = 1;
  let repeatGapSeconds = 2;
  let autoRepeatActive = false;
  let autoRepeatTargetCount = 1;
  let autoRepeatCompletedCount = 0;
  let autoRepeatTimer = null;
  let segmentEndHandled = false;
  let retryingSegmentIndex = null;

  const audio = document.getElementById('audio');
  const exerciseId = "{{ exercise_id }}";

  // ── Task Mode ──
  const urlParams = new URLSearchParams(window.location.search);
  const taskId = urlParams.get('task_id');
  const taskToken = urlParams.get('token') || '';
  let taskProgress = {};  // segment_index -> result
  const freeStudentName = sessionStorage.getItem('listening_student') || localStorage.getItem('listening_student') || 'guest';

  function getFreeProgressStorageKey() {
    return `listening_free_progress_${exerciseId}_${freeStudentName}`;
  }

  // ── Error Summary (per-segment notes) ──
  let errorSummaries = {};            // { segGlobalIdx: "text" }
  let errorSummarySaveTimer = null;
  let errorSummaryDirty = false;

  function getErrorSummaryStorageKey() {
    return `listening_error_summary_${exerciseId}_${freeStudentName}`;
  }

  function loadErrorSummaries() {
    try {
      errorSummaries = JSON.parse(localStorage.getItem(getErrorSummaryStorageKey()) || '{}') || {};
    } catch (err) {
      errorSummaries = {};
    }
  }

  function saveErrorSummaries() {
    try {
      localStorage.setItem(getErrorSummaryStorageKey(), JSON.stringify(errorSummaries));
    } catch (err) {
      console.warn('error summary save failed', err);
    }
  }

  function setErrorSummaryStatus(text, cls) {
    const el = document.getElementById('errorSummaryStatus');
    if (!el) return;
    el.textContent = text || '';
    el.className = 'esb-status' + (cls ? ' ' + cls : '');
  }

  function loadErrorSummaryForCurrent() {
    const ta = document.getElementById('errorSummaryInput');
    if (!ta) return;
    const segGlobalIdx = getGlobalSegmentIndex();
    const value = errorSummaries[segGlobalIdx] || '';
    ta.value = value;
    errorSummaryDirty = false;
    setErrorSummaryStatus(value ? '已保存' : '', value ? 'saved' : '');
  }

  function persistCurrentErrorSummary(force) {
    const ta = document.getElementById('errorSummaryInput');
    if (!ta) return;
    const segGlobalIdx = getGlobalSegmentIndex();
    const val = ta.value;
    const prev = errorSummaries[segGlobalIdx] || '';
    if (!force && val === prev) {
      errorSummaryDirty = false;
      return;
    }
    if (val.trim()) {
      errorSummaries[segGlobalIdx] = val;
    } else {
      delete errorSummaries[segGlobalIdx];
    }
    saveErrorSummaries();
    errorSummaryDirty = false;
    setErrorSummaryStatus('已保存', 'saved');
  }

  function scheduleErrorSummarySave() {
    errorSummaryDirty = true;
    setErrorSummaryStatus('未保存…', 'dirty');
    if (errorSummarySaveTimer) clearTimeout(errorSummarySaveTimer);
    errorSummarySaveTimer = setTimeout(() => {
      persistCurrentErrorSummary(false);
    }, 700);
  }

  function loadFreeProgress() {
    try {
      freeProgress = JSON.parse(localStorage.getItem(getFreeProgressStorageKey()) || '{}') || {};
    } catch (err) {
      freeProgress = {};
    }
  }

  function saveFreeProgress() {
    try {
      localStorage.setItem(getFreeProgressStorageKey(), JSON.stringify(freeProgress));
    } catch (err) {
      console.warn('free progress save failed', err);
    }
  }

  function clearFreeProgress() {
    freeProgress = {};
    try {
      localStorage.removeItem(getFreeProgressStorageKey());
    } catch (err) {
      console.warn('free progress clear failed', err);
    }
  }

  function getSegmentSourceIndex(seg, fallbackIdx) {
    return typeof seg?.source_index === 'number' ? seg.source_index : fallbackIdx;
  }

  function stripSpeakerLabel(text) {
    return (text || '')
      .trim()
      .replace(/^(?:[A-Z][A-Z\s.'&/-]{0,40}|[A-Z][a-z]+(?:\s+[A-Z][a-z]+){0,3})\s*:\s*/, '');
  }

  function getPracticeText(seg) {
    return stripSpeakerLabel(seg?.text || '').trim();
  }

  function splitPracticeWords(text) {
    return (text || '').split(/\s+/).filter(Boolean);
  }

  function getCurrentModeRange() {
    const seg = currentSegments()[currentSegIdx];
    if (!seg) return null;

    return {
      start: seg.start,
      end: seg.end,
      text: getPracticeText(seg),
      translation: (seg.translation || '').trim(),
    };
  }

  function getEffectiveProgress(progressMap, segGlobalIdx, practiceText) {
    const progress = progressMap[segGlobalIdx];
    if (!progress) return null;
    if (progress.segment_text && progress.segment_text !== practiceText) return null;
    return progress;
  }

  function applyCompletedMarkers(progressMap) {
    completedSegs.clear();
    let globalOffset = 0;
    data.parts.forEach((part, pIdx) => {
      (part.segments || []).forEach((seg, sIdx) => {
        const realIdx = getSegmentSourceIndex(seg, globalOffset + sIdx);
        if (progressMap[realIdx] && progressMap[realIdx].is_completed) {
          completedSegs.add(`${pIdx}-${sIdx}`);
        }
      });
      globalOffset += (part.segments || []).length;
    });
  }

  function updatePracticeSubtitle(progressMap, totalSegs) {
    const sub = document.getElementById('exerciseSubtitle');
    if (!sub) return;
    const rows = Object.values(progressMap || {});
    const completedCount = rows.filter(r => r.is_completed).length;
    const correctWords = rows.reduce((sum, r) => sum + (Number(r.correct_words) || 0), 0);
    const totalWords = rows.reduce((sum, r) => sum + (Number(r.total_words) || 0), 0);
    const accuracy = totalWords > 0 ? Math.round(correctWords * 100 / totalWords) : 0;
    if (completedCount > 0) {
      sub.textContent = `已完成 ${completedCount}/${totalSegs} 句 · 正确率 ${accuracy}%`;
    } else if (taskId) {
      sub.textContent = `已完成 0/${totalSegs} 句`;
    } else {
      sub.textContent = '自由练习 · 本地自动保存进度';
    }
  }

  function totalSegmentCount() {
    return data.parts.reduce((sum, part) => sum + (part.segments || []).length, 0);
  }

  function getCurrentSegmentProgress(segGlobalIdx) {
    const seg = currentSegments()[currentSegIdx];
    const practiceText = getPracticeText(seg);
    if (taskId) return getEffectiveProgress(taskProgress, segGlobalIdx, practiceText);
    return getEffectiveProgress(freeProgress, segGlobalIdx, practiceText);
  }

  function showSavedDictationResult(progress) {
    if (!progress) return;
    const inputs = document.querySelectorAll('.dictation-area input');
    const answers = Array.isArray(progress.answers_json) ? progress.answers_json : [];
    inputs.forEach((input, idx) => {
      const guessRaw = answers[idx] || '';
      const guess = normalizeDictationWord(guessRaw);
      const isCorrect = guess === input.dataset.answer;
      input.className = isCorrect ? 'correct' : 'incorrect';
      input.value = isCorrect ? guessRaw : (input.dataset.displayAnswer || input.dataset.answer);
      input.disabled = true;
    });
    document.getElementById('scoreValue').textContent = Math.round(progress.accuracy || 0);
    document.getElementById('scoreDetail').textContent = `${progress.correct_words || 0}/${progress.total_words || 0} 词正确`;
    document.getElementById('scoreBar').style.display = 'flex';
  }

  function resetCurrentSentenceState() {
    document.getElementById('scoreBar').style.display = 'none';
  }

  const practiceStartedAt = Date.now();

  function computeDurationSeconds() {
    return Math.max(0, Math.round((Date.now() - practiceStartedAt) / 1000));
  }

  // ── Deterministic seed hash ──
  function hashCode(str) {
    let hash = 0;
    for (let i = 0; i < str.length; i++) {
      const ch = str.charCodeAt(i);
      hash = ((hash << 5) - hash) + ch;
      hash |= 0;
    }
    return hash;
  }

  function seededRandom(seed) {
    let s = seed;
    return function() {
      s = (s * 1664525 + 1013904223) & 0x7fffffff;
      return s / 0x7fffffff;
    };
  }

  // ── Load Data ──
  if (taskId) {
    // Task mode: load via task API (server uses current_user for auth if logged in)
    const tokenParam = taskToken ? `?token=${encodeURIComponent(taskToken)}` : '';
    fetch(`/api/student/listening/task/${taskId}${tokenParam}`)
      .then(r => r.json())
      .then(d => {
        if (!d.ok) { alert('加载失败: ' + (d.error || '未知错误')); return; }
        data = d.exercise;
        taskProgress = d.progress || {};
        init();
      })
      .catch(e => alert('加载数据失败: ' + e.message));
  } else {
    // Free practice mode
    fetch(`/api/listening/${exerciseId}`)
      .then(r => r.json())
      .then(d => { data = d; loadFreeProgress(); init(); })
      .catch(e => alert('加载数据失败: ' + e.message));
  }

  function init() {
    document.getElementById('exerciseTitle').textContent = data.title;
    audio.src = `/static/listening/${data.audio}`;
    const freeResetBtn = document.getElementById('btnResetFreeProgress');
    if (freeResetBtn) {
      freeResetBtn.style.display = taskId ? 'none' : 'inline-flex';
    }

    loadErrorSummaries();
    bindErrorSummaryHandlers();

    // In task mode, show progress subtitle
    if (taskId) {
      const totalSegs = totalSegmentCount();
      applyCompletedMarkers(taskProgress);
      updatePracticeSubtitle(taskProgress, totalSegs);
    } else {
      const totalSegs = totalSegmentCount();
      applyCompletedMarkers(freeProgress);
      updatePracticeSubtitle(freeProgress, totalSegs);
    }

    updateModeControls();
    buildPartTabs();
    buildSentenceList();
    selectSegment(0);
    audio.addEventListener('timeupdate', onTimeUpdate);
    audio.addEventListener('loadedmetadata', () => {
      document.getElementById('totalTime').textContent = fmtTime(audio.duration);
    });
  }

  // ── Part Tabs ──
  function buildPartTabs() {
    const container = document.getElementById('partTabs');
    container.innerHTML = '';
    data.parts.forEach((part, i) => {
      const btn = document.createElement('button');
      btn.className = 'part-tab' + (i === currentPartIdx ? ' active' : '');
      btn.textContent = part.name;
      btn.onclick = () => { currentPartIdx = i; buildSentenceList(); selectSegment(0); updatePartTabs(); };
      container.appendChild(btn);
    });
  }

  function updatePartTabs() {
    document.querySelectorAll('.part-tab').forEach((btn, i) => {
      btn.classList.toggle('active', i === currentPartIdx);
    });
  }

  function isSegmentPracticeMode() {
    return mode === 'sentence' || mode === 'dictation';
  }

  function clearAutoRepeatTimer() {
    if (autoRepeatTimer) {
      clearTimeout(autoRepeatTimer);
      autoRepeatTimer = null;
    }
  }

  function stopAutoRepeat(resetRemaining = true) {
    autoRepeatActive = false;
    clearAutoRepeatTimer();
    if (resetRemaining) {
      autoRepeatTargetCount = repeatCount;
      autoRepeatCompletedCount = 0;
    }
    segmentEndHandled = false;
  }

  function playCurrentSegmentPass() {
    const seg = currentSegments()[currentSegIdx];
    if (!seg) return;
    segmentEndHandled = false;
    audio.currentTime = seg.start;
    audio.play();
    updatePlayBtn(true);
  }

  function startAutoRepeatSequence() {
    const seg = currentSegments()[currentSegIdx];
    if (!seg) return;
    stopAutoRepeat(false);
    autoRepeatActive = true;
    autoRepeatTargetCount = repeatCount;
    autoRepeatCompletedCount = 0;
    playCurrentSegmentPass();
  }

  function normalizeDictationWord(word) {
    return (word || '')
      .toLowerCase()
      .replace(/[^\w]/g, '');
  }

  // ── Sentence List ──
  function buildSentenceList() {
    const container = document.getElementById('sentenceList');
    container.innerHTML = '';
    const segments = currentSegments();
    segments.forEach((seg, i) => {
      const div = document.createElement('div');
      div.className = 'sentence-item' + (i === currentSegIdx ? ' active' : '');
      if (completedSegs.has(`${currentPartIdx}-${i}`)) div.classList.add('completed');
      const dur = (seg.end - seg.start).toFixed(1);
      div.innerHTML = `
        <span class="sent-status">${completedSegs.has(`${currentPartIdx}-${i}`) ? '✓' : ''}</span>
        <span class="sent-label">第${i + 1}句</span>
        <span class="sent-dur">${dur}s</span>
      `;
      div.onclick = () => selectSegment(i);
      container.appendChild(div);
    });
  }

  function currentSegments() {
    return data.parts[currentPartIdx]?.segments || [];
  }

  // ── Select Segment ──
  function selectSegment(idx) {
    const segs = currentSegments();
    if (idx < 0 || idx >= segs.length) return;
    // 切换前先把当前句的错因总结落盘
    if (errorSummaryDirty) persistCurrentErrorSummary(true);
    stopAutoRepeat();
    audio.pause();
    currentSegIdx = idx;
    retryingSegmentIndex = null;
    const seg = segs[idx];

    // Update sidebar
    document.querySelectorAll('.sentence-item').forEach((el, i) => {
      el.classList.toggle('active', i === idx);
    });
    // Scroll active into view
    const activeEl = document.querySelector('.sentence-item.active');
    if (activeEl) activeEl.scrollIntoView({ block: 'nearest', behavior: 'smooth' });

    document.getElementById('currentSentenceLabel').textContent =
      `第${idx + 1}句 / 共${segs.length}句`;

    // Seek audio
    segmentEndHandled = false;
    audio.currentTime = seg.start;

    // Render content based on mode
    renderContent();
    // 加载本句的错因总结
    loadErrorSummaryForCurrent();
  }

  // ── Render Content ──
  function renderContent() {
    const seg = currentSegments()[currentSegIdx];
    if (!seg) return;
    const modeRange = getCurrentModeRange();
    const practiceText = getPracticeText(seg);

    const area = document.getElementById('dictationArea');
    const origEl = document.getElementById('originalText');
    const transEl = document.getElementById('translationText');
    const scoreBar = document.getElementById('scoreBar');
    scoreBar.style.display = 'none';

    origEl.textContent = modeRange?.text || practiceText;
    origEl.className = 'original-text' + (showOriginal ? ' visible' : '');
    transEl.textContent = modeRange?.translation || '';
    transEl.className = 'translation-text' + (showTranslation ? ' visible' : '');

    if (mode === 'sentence' || mode === 'dictation') {
      renderDictation(seg);
    } else {
      resetCurrentSentenceState();
      area.innerHTML = '';
      const block = document.createElement('div');
      block.style.fontSize = '20px';
      block.style.lineHeight = '2';
      block.style.color = 'var(--text-muted)';
      block.style.padding = '24px 0';
      if (showOriginal) {
        block.style.color = 'var(--text)';
        block.textContent = modeRange?.text || practiceText || '当前片段没有可显示的文本';
      } else {
        block.innerHTML = '<span style="opacity:0.45;">当前为精听模式。先听，再按“显示原文”核对。</span>';
      }
      area.appendChild(block);
    }
  }

  // ── Dictation Mode ──
  function getHideIndices(seg, segGlobalIdx) {
    const practiceText = getPracticeText(seg);
    const words = splitPracticeWords(practiceText);
    if (!words.length) return new Set();
    const hideRatio = mode === 'sentence' ? 1.0 : 0.6;
    const hideCount = Math.max(1, Math.round(words.length * hideRatio));

    // In task mode, check if we already have fixed indices from a previous attempt
    const taskSavedProgress = getEffectiveProgress(taskProgress, segGlobalIdx, practiceText);
    if (taskId && taskSavedProgress && taskSavedProgress.hidden_word_indices) {
      return new Set(taskSavedProgress.hidden_word_indices);
    }
    const freeSavedProgress = getEffectiveProgress(freeProgress, segGlobalIdx, practiceText);
    if (!taskId && freeSavedProgress && freeSavedProgress.hidden_word_indices) {
      return new Set(freeSavedProgress.hidden_word_indices);
    }

    if (taskId) {
      // Deterministic: seed from task_id + segment_index + first 20 chars of text
      const seedStr = `${taskId}-${segGlobalIdx}-${practiceText.substring(0, 20)}`;
      const rng = seededRandom(hashCode(seedStr));
      const indices = [];
      for (let i = 0; i < words.length; i++) indices.push(i);
      // Fisher-Yates shuffle with seeded random
      for (let i = indices.length - 1; i > 0; i--) {
        const j = Math.floor(rng() * (i + 1));
        [indices[i], indices[j]] = [indices[j], indices[i]];
      }
      return new Set(indices.slice(0, hideCount));
    } else {
      // Free mode: random
      const hideIndices = new Set();
      while (hideIndices.size < hideCount) {
        hideIndices.add(Math.floor(Math.random() * words.length));
      }
      return hideIndices;
    }
  }

  function getGlobalSegmentIndex() {
    const seg = currentSegments()[currentSegIdx];
    if (seg && typeof seg.source_index === 'number') return seg.source_index;
    let idx = 0;
    for (let p = 0; p < currentPartIdx; p++) {
      idx += (data.parts[p]?.segments || []).length;
    }
    return idx + currentSegIdx;
  }

  function renderDictation(seg) {
    const area = document.getElementById('dictationArea');
    area.innerHTML = '';
    resetCurrentSentenceState();

    const practiceText = getPracticeText(seg);
    const words = splitPracticeWords(practiceText);
    const segGlobalIdx = getGlobalSegmentIndex();
    const hideIndices = getHideIndices(seg, segGlobalIdx);

    words.forEach((word, i) => {
      if (hideIndices.has(i)) {
        const slot = document.createElement('span');
        slot.className = 'word-slot';
        const input = document.createElement('input');
        input.type = 'text';
        const displayAnswer = word.replace(/^[.,!?;:"'“”‘’()]+|[.,!?;:"'“”‘’()]+$/g, '');
        input.dataset.answer = normalizeDictationWord(displayAnswer);
        input.dataset.displayAnswer = displayAnswer;
        input.dataset.index = i;
        input.style.width = Math.max(50, displayAnswer.length * 12) + 'px';
        input.addEventListener('keydown', onDictationKey);
        slot.appendChild(input);
        area.appendChild(slot);

        // Append punctuation after input if any
        const punc = word.match(/[.,!?;:'"]+$/);
        if (punc) {
          const span = document.createElement('span');
          span.className = 'word-visible';
          span.textContent = punc[0] + ' ';
          area.appendChild(span);
        } else {
          area.appendChild(document.createTextNode(' '));
        }
      } else {
        const span = document.createElement('span');
        span.className = 'word-visible';
        span.textContent = word + ' ';
        area.appendChild(span);
      }
    });

    // Focus first input
    setTimeout(() => {
      const first = area.querySelector('input');
      if (first) first.focus();
    }, 100);

    const savedProgress = getCurrentSegmentProgress(segGlobalIdx);
    if (savedProgress && savedProgress.is_completed && retryingSegmentIndex !== segGlobalIdx) {
      showSavedDictationResult(savedProgress);
    }
  }

  function onDictationKey(e) {
    if (e.key === 'Enter') {
      e.preventDefault();
      checkDictation();
    } else if (e.key === 'Tab') {
      // Move to next input
      e.preventDefault();
      const inputs = document.querySelectorAll('.dictation-area input');
      const arr = Array.from(inputs);
      const idx = arr.indexOf(e.target);
      if (idx < arr.length - 1) arr[idx + 1].focus();
      else checkDictation();
    }
  }

  function checkDictation() {
    const inputs = document.querySelectorAll('.dictation-area input');
    let correct = 0;
    let total = inputs.length;
    const answers = [];

    inputs.forEach(input => {
      const answer = input.dataset.answer;
      const guessRaw = input.value.trim();
      const guess = normalizeDictationWord(guessRaw);
      answers.push(guessRaw);
      if (guess === answer) {
        input.className = 'correct';
        correct++;
      } else {
        input.className = 'incorrect';
        input.value = input.dataset.displayAnswer || input.dataset.answer;
      }
      input.disabled = true;
    });

    const pct = total > 0 ? Math.round(correct / total * 100) : 0;
    retryingSegmentIndex = null;
    document.getElementById('scoreValue').textContent = pct;
    document.getElementById('scoreDetail').textContent = `${correct}/${total} 词正确`;
    document.getElementById('scoreBar').style.display = 'flex';

    completedSegs.add(`${currentPartIdx}-${currentSegIdx}`);
    buildSentenceList();

    // In task mode, submit segment result to server
    if (taskId) {
      const seg = currentSegments()[currentSegIdx];
      const practiceText = getPracticeText(seg);
      const segGlobalIdx = getGlobalSegmentIndex();
      const hideIndices = Array.from(getHideIndices(seg, segGlobalIdx));

      fetch(`/api/student/listening/task/${taskId}/segment/${segGlobalIdx}`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          token: taskToken,
          segment_text: practiceText,
          hidden_word_indices: hideIndices,
          answers: answers,
          correct_words: correct,
          total_words: total,
          duration_seconds: computeDurationSeconds(),
        })
      })
      .then(r => r.json())
      .then(d => {
        if (d.ok) {
          // Update local progress cache
          taskProgress[segGlobalIdx] = {
            segment_index: segGlobalIdx,
            segment_text: practiceText,
            correct_words: correct,
            total_words: total,
            accuracy: pct,
            is_completed: true,
            hidden_word_indices: hideIndices,
            answers_json: answers,
          };
          applyCompletedMarkers(taskProgress);
          buildSentenceList();
          updatePracticeSubtitle(taskProgress, totalSegmentCount());
        }
      })
      .catch(e => console.error('保存进度失败:', e));
    } else {
      const seg = currentSegments()[currentSegIdx];
      const practiceText = getPracticeText(seg);
      const segGlobalIdx = getGlobalSegmentIndex();
      const hideIndices = Array.from(getHideIndices(seg, segGlobalIdx));
      freeProgress[segGlobalIdx] = {
        segment_index: segGlobalIdx,
        segment_text: practiceText,
        correct_words: correct,
        total_words: total,
        accuracy: pct,
        is_completed: true,
        hidden_word_indices: hideIndices,
        answers_json: answers,
      };
      saveFreeProgress();
      applyCompletedMarkers(freeProgress);
      buildSentenceList();
      updatePracticeSubtitle(freeProgress, totalSegmentCount());
    }
  }

  // ── Audio Time Update ──
  function onTimeUpdate() {
    const t = audio.currentTime;
    const d = audio.duration || 1;
    document.getElementById('currentTime').textContent = fmtTime(t);
    document.getElementById('progressFill').style.width = (t / d * 100) + '%';

    const modeRange = getCurrentModeRange();
    if (modeRange && t >= modeRange.end && !segmentEndHandled) {
        segmentEndHandled = true;
        if (sentenceLoopActive && isSegmentPracticeMode()) {
          segmentEndHandled = false;
          audio.currentTime = modeRange.start;
        } else if (autoRepeatActive) {
          audio.pause();
          updatePlayBtn(false);
          autoRepeatCompletedCount += 1;
          if (autoRepeatCompletedCount < autoRepeatTargetCount) {
            clearAutoRepeatTimer();
            autoRepeatTimer = setTimeout(() => {
              if (!autoRepeatActive) return;
              playCurrentSegmentPass();
            }, repeatGapSeconds * 1000);
          } else {
            stopAutoRepeat();
          }
        } else {
          audio.pause();
          updatePlayBtn(false);
        }
    }
  }

  // ── Controls ──
  function togglePlay() {
    if (audio.paused) {
      if (isSegmentPracticeMode()) {
        startAutoRepeatSequence();
      } else {
        const modeRange = getCurrentModeRange();
        if (modeRange) {
          segmentEndHandled = false;
          audio.currentTime = modeRange.start;
        }
        audio.play();
        updatePlayBtn(true);
      }
    } else {
      stopAutoRepeat();
      audio.pause();
      updatePlayBtn(false);
    }
  }

  function updatePlayBtn(playing) {
    isPlaying = playing;
    document.getElementById('iconPlay').style.display = playing ? 'none' : 'block';
    document.getElementById('iconPause').style.display = playing ? 'block' : 'none';
  }

  audio.addEventListener('play', () => updatePlayBtn(true));
  audio.addEventListener('pause', () => updatePlayBtn(false));

  // Button bindings
  document.getElementById('btnPlay').onclick = togglePlay;
  document.getElementById('btnPrev').onclick = () => selectSegment(currentSegIdx - 1);
  document.getElementById('btnNext').onclick = () => selectSegment(currentSegIdx + 1);
  document.getElementById('btnRepeat').onclick = () => {
    if (isSegmentPracticeMode()) {
      startAutoRepeatSequence();
      return;
    }
    const modeRange = getCurrentModeRange();
    if (modeRange) {
      stopAutoRepeat();
      segmentEndHandled = false;
      audio.currentTime = modeRange.start;
      audio.play();
      updatePlayBtn(true);
    }
  };
  document.getElementById('btnBack5').onclick = () => {
    stopAutoRepeat();
    audio.currentTime = Math.max(0, audio.currentTime - 5);
  };
  document.getElementById('btnFwd5').onclick = () => {
    stopAutoRepeat();
    audio.currentTime += 5;
  };

  document.getElementById('speedSelect').onchange = function() {
    audio.playbackRate = parseFloat(this.value);
  };
  document.getElementById('repeatCountSelect').onchange = function() {
    repeatCount = parseInt(this.value, 10) || 1;
    if (autoRepeatActive) {
      autoRepeatTargetCount = repeatCount;
      if (autoRepeatCompletedCount >= autoRepeatTargetCount) {
        stopAutoRepeat();
        audio.pause();
        updatePlayBtn(false);
      }
    }
  };
  document.getElementById('repeatGapSelect').onchange = function() {
    repeatGapSeconds = parseInt(this.value, 10) || 2;
  };

  document.getElementById('btnShowText').onclick = function() {
    showOriginal = !showOriginal;
    this.classList.toggle('on', showOriginal);
    renderContent();
  };

  document.getElementById('btnShowTrans').onclick = function() {
    showTranslation = !showTranslation;
    this.classList.toggle('on', showTranslation);
    renderContent();
  };

  document.getElementById('btnRetry').onclick = () => {
    resetCurrentSentenceState();
    const segGlobalIdx = getGlobalSegmentIndex();
    if (!taskId) {
      delete freeProgress[segGlobalIdx];
      saveFreeProgress();
      applyCompletedMarkers(freeProgress);
      buildSentenceList();
      updatePracticeSubtitle(freeProgress, totalSegmentCount());
    } else {
      retryingSegmentIndex = segGlobalIdx;
    }
    renderContent();
  };
  document.getElementById('btnNextAfterScore').onclick = () => selectSegment(currentSegIdx + 1);
  document.getElementById('btnResetFreeProgress').onclick = () => {
    if (taskId) return;
    if (!confirm('确认清空本篇自由练习进度？已保存的本地结果会被移除。')) return;
    clearFreeProgress();
    applyCompletedMarkers(freeProgress);
    buildSentenceList();
    updatePracticeSubtitle(freeProgress, totalSegmentCount());
    renderContent();
  };

  function updateModeControls() {
    document.getElementById('btnShowText').style.display = 'inline-flex';
    const repeatBtn = document.getElementById('btnRepeat');
    repeatBtn.textContent = '↻ 当前句';
  }

  function bindErrorSummaryHandlers() {
    const ta = document.getElementById('errorSummaryInput');
    if (!ta) return;
    ta.addEventListener('input', scheduleErrorSummarySave);
    ta.addEventListener('blur', () => {
      if (errorSummaryDirty) persistCurrentErrorSummary(true);
    });
    ta.addEventListener('keydown', (e) => {
      if ((e.ctrlKey || e.metaKey) && (e.key === 's' || e.key === 'S')) {
        e.preventDefault();
        persistCurrentErrorSummary(true);
      }
    });
    window.addEventListener('beforeunload', () => {
      if (errorSummaryDirty) persistCurrentErrorSummary(true);
    });
  }

  // Mode tabs
  document.querySelectorAll('.mode-tab').forEach(tab => {
    tab.onclick = function() {
      stopAutoRepeat();
      audio.pause();
      mode = this.dataset.mode;
      document.querySelectorAll('.mode-tab').forEach(t => t.classList.toggle('active', t === this));
      updateModeControls();
      renderContent();
    };
  });

  // Progress bar click
  document.getElementById('progressTrack').onclick = function(e) {
    stopAutoRepeat();
    const rect = this.getBoundingClientRect();
    const pct = (e.clientX - rect.left) / rect.width;
    audio.currentTime = pct * audio.duration;
  };

  // ── Keyboard Shortcuts ──
  document.addEventListener('keydown', (e) => {
    // Don't trigger shortcuts when typing in inputs
    if (e.target.tagName === 'INPUT' || e.target.tagName === 'TEXTAREA') {
      if (e.key === ' ' && e.ctrlKey) { e.preventDefault(); togglePlay(); }
      return;
    }

    switch(e.key) {
      case ' ':
        e.preventDefault();
        togglePlay();
        break;
      case '[':
        selectSegment(currentSegIdx - 1);
        break;
      case ']':
        selectSegment(currentSegIdx + 1);
        break;
      case 'r':
      case 'R':
        const seg = currentSegments()[currentSegIdx];
        if (seg) { audio.currentTime = seg.start; audio.play(); updatePlayBtn(true); }
        break;
      case ',':
      case '<':
        audio.currentTime = Math.max(0, audio.currentTime - 5);
        break;
      case '.':
      case '>':
        audio.currentTime += 5;
        break;
      case '-':
        document.getElementById('btnShowText').click();
        break;
      case '=':
        document.getElementById('btnShowTrans').click();
        break;
    }
  });

  // ── Helpers ──
  function fmtTime(s) {
    if (!s || isNaN(s)) return '00:00';
    const m = Math.floor(s / 60);
    const sec = Math.floor(s % 60);
    return String(m).padStart(2, '0') + ':' + String(sec).padStart(2, '0');
  }
})();
</script>
</body>
</html>
