}

  gap: 8px;
}
.practice-book-row {

}
summary.practice-test-chip {
  list-style: none;
}

}
.practice-test-chip:hover,
.practice-test-chip:focus-visible,
.practice-test-disclosure[open] > .practice-test-chip {

}
.practice-test-chip--done {

.practice-test-chip__score {

}
.practice-test-parts {

  grid-template-columns: repeat(4, minmax(0, 1fr));

}

  gap: 6px;

}

  border-radius: var(--r);
}
.listening-catalog-layout {

  grid-template-columns: 220px minmax(0, 1fr);
  gap: 18px;
  align-items: start;
}
.listening-catalog-sidebar {

  top: 18px;

  font-size: var(--fs-sm);

  min-height: 42px;
  padding: 10px 12px;

  border-radius: var(--r-sm);
  color: var(--text);
  font-size: var(--fs-base);
}
.listening-catalog-sidebar__search:focus {
  border-color: var(--brand);
  box-shadow: var(--focus-ring);
}
.listening-catalog-sidebar__meta {
  margin: 12px 0 14px;
  color: var(--muted);
  font-size: var(--fs-sm);
  line-height: 1.6;
}
.listening-catalog-sidebar__links {
  display: flex;
  flex-direction: column;
  gap: 6px;
  max-height: calc(100vh - 260px);
  overflow: auto;
}
.listening-catalog-sidebar__link {
  display: flex;
  justify-content: space-between;
  gap: 8px;
  padding: 9px 10px;
  border-radius: var(--r-sm);
  color: var(--text);
  font-size: var(--fs-sm);
  font-weight: 800;
  text-decoration: none;
}
.listening-catalog-sidebar__link span:last-child {
  color: var(--muted);
  font-weight: 700;
}
.listening-catalog-sidebar__link:hover {
  background: var(--brand-tint);
  color: var(--brand-dark);
}
.listening-intensive-main {
  display: flex;
  flex-direction: column;
  gap: 18px;
  min-width: 0;
}
.listening-intensive-book {

  border-radius: var(--r);
  background: #fff;
  box-shadow: var(--shadow-sm);
}

  display: flex;
  align-items: baseline;
  justify-content: space-between;
  gap: 12px;
  min-height: 58px;
  padding: 14px 18px;
  background: var(--brand);
  color: #fff;
}
.listening-intensive-book__title {
  display: flex;
  align-items: baseline;
  gap: 12px;
  min-width: 0;
}
.listening-intensive-book__label {
  font-size: var(--fs-md);
  font-weight: 800;
  letter-spacing: .04em;
  text-transform: uppercase;
  opacity: .9;
}
.listening-intensive-book__number {
  font-size: 28px;
  line-height: 1;
  font-weight: 900;
}
.listening-intensive-book__meta {
  font-size: var(--fs-sm);
  font-weight: 800;
  opacity: .9;
  white-space: nowrap;
}
.listening-intensive-test-grid {
  display: grid;
  grid-template-columns: repeat(2, minmax(0, 1fr));
  gap: 12px;
  padding: 12px;
}
.listening-intensive-test {
  border: 1px solid var(--line);
  border-radius: var(--r-sm);
  background: var(--brand-tint);
  overflow: hidden;
}
.listening-intensive-test__head {
  display: flex;
  align-items: flex-start;
  justify-content: space-between;
  gap: 10px;
  padding: 12px 14px;
  border-bottom: 1px solid var(--line);
}

  margin: 0;
  color: var(--text-strong);
  font-size: 18px;
  line-height: 1.3;
}
.listening-intensive-test__meta {

  color: var(--muted);
  font-size: var(--fs-sm);
  line-height: 1.5;
}

  grid-template-columns: repeat(2, minmax(0, 1fr));
  gap: 8px;
  padding: 10px;
}

  display: flex;
  flex-direction: column;
  gap: 10px;
  min-height: 128px;
  padding: 12px;
  border: 1px solid rgba(47, 142, 135, .12);
  border-radius: var(--r-sm);
  background: #fff;
}
.listening-intensive-section__top {
  display: flex;
  align-items: flex-start;
  justify-content: space-between;
  gap: 10px;
}
.listening-intensive-section__link {
  color: var(--text-strong);
  font-size: var(--fs-md);
  font-weight: 900;
  text-decoration: none;
}
.listening-intensive-section__link:hover {
  color: var(--brand-dark);
  text-decoration: underline;
}
.listening-intensive-section__meta {
  margin-top: 4px;
  color: var(--muted);
  font-size: var(--fs-sm);
  line-height: 1.45;
}
.listening-intensive-section__score {
  color: var(--muted);
  font-size: var(--fs-xs);
  font-weight: 800;
  white-space: nowrap;
}
.listening-intensive-section__actions {
  display: flex;
  gap: 8px;
  margin-top: auto;
}
.listening-intensive-section__actions .action-btn {
  min-height: 34px;
  padding: 7px 10px;
}
.listening-intensive-other {
  margin-top: 18px;
}
.listening-intensive-other__title {
  margin: 0 0 12px;
  color: var(--text-strong);
  font-size: var(--fs-lg);
}
.listening-catalog-no-results {
  display: none;
  padding: 34px 18px;
  border: 1px dashed var(--line-strong);
  border-radius: var(--r);
  background: #fff;
  color: var(--muted);
  text-align: center;
}
.listening-catalog-layout.is-empty .listening-catalog-no-results {
  display: block;
}

  .listening-resource-grid {
    grid-template-columns: repeat(2, minmax(0, 1fr));
  }
  .listening-catalog-layout {
    grid-template-columns: 1fr;
  }
  .listening-catalog-sidebar {
    position: static;
  }
  .listening-catalog-sidebar__links {
    flex-direction: row;
