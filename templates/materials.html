{% extends "base.html" %}

{% block title %}材料库管理{% endblock %}

{% block content_dashboard %}
<div class="container-fluid">
    <div class="row">
        <div class="col-md-12">
            <div class="card">
                <div class="card-header d-flex justify-content-between align-items-end">
                    <!-- Tabs -->
                    <ul class="nav nav-tabs card-header-tabs" id="materialTabs" role="tablist">
                        <li class="nav-item">
                            <a class="nav-link active" id="materials-tab" data-toggle="tab" href="#materials"
                                role="tab">
                                📚 教辅材料
                            </a>
                        </li>
                        <li class="nav-item">
                            <a class="nav-link" id="dictation-tab" data-toggle="tab" href="#dictation" role="tab">
                                🎧 听写词库
                            </a>
                        </li>
                    </ul>
                    <button class="btn btn-sm btn-primary" onclick="window.location.href='/materials/create'">
                        <i class="fas fa-plus"></i> 创建新材料
                    </button>
                </div>
                <div class="card-body">
                    <div class="tab-content" id="materialTabContent">
                        <!-- 教辅材料 Tab -->
                        <div class="tab-pane fade show active" id="materials" role="tabpanel">
                            <div class="d-flex justify-content-between align-items-center mb-3">
                                <h5 class="mb-0">材料列表</h5>
                            </div>
                            <!-- 筛选栏 -->
                            <div class="row mb-3">
                                <div class="col-md-3">
                                    <select class="form-control" id="typeFilter" onchange="filterMaterials()">
                                        <option value="">全部类型</option>
                                        <option value="grammar">语法练习</option>
                                        <option value="translation">翻译练习</option>
                                        <option value="reading_vocab_choice">阅读词汇选择题</option>
                                        <option value="ielts_reading_practice">雅思阅读真题</option>
                                        <option value="speaking">口语朗读</option>
                                        <option value="writing">写作训练</option>
                                    </select>
                                </div>
                                <div class="col-md-6">
                                    <input type="text" class="form-control" id="searchInput" placeholder="搜索材料标题..."
                                        onkeyup="filterMaterials()">
                                </div>
                                <div class="col-md-3">
                                    <button class="btn btn-outline-secondary btn-block" onclick="loadMaterials()">
                                        <i class="fas fa-sync"></i> 刷新
                                    </button>
                                </div>
                            </div>

                            <!-- 材料列表 -->
                            <div id="materialsList">
                                <div class="text-center py-5">
                                    <div class="spinner-border text-primary" role="status">
                                        <span class="sr-only">加载中...</span>
                                    </div>
                                </div>
                            </div>
                        </div>

                        <!-- 听写词库 Tab -->
                        <div class="tab-pane fade" id="dictation" role="tabpanel">
                            <div class="d-flex justify-content-between align-items-center mb-3">
                                <h5 class="mb-0">听写词库</h5>
                                <div>
                                    <button class="btn btn-sm btn-outline-info" onclick="document.getElementById('vocabPdfUploadArea').style.display = document.getElementById('vocabPdfUploadArea').style.display === 'none' ? 'block' : 'none'">
                                        📄 上传翻译词汇PDF
                                    </button>
                                    <small class="text-muted ml-2">💡 或点击"创建新材料"选择"听写词库"类型</small>
                                </div>
                            </div>

                            <!-- 翻译词汇PDF上传区域 -->
                            <div id="vocabPdfUploadArea" style="display: none;" class="card bg-light mb-3">
                                <div class="card-body">
                                    <h6>上传翻译词汇PDF（看中文写英文）</h6>
                                    <p class="text-muted small">支持托福/雅思写作词汇等中英对照PDF，系统自动按话题分类</p>
                                    <div class="form-group">
                                        <input type="text" class="form-control form-control-sm mb-2" id="vocabPdfTitle" placeholder="词库标题（选填，默认用文件名）">
                                        <input type="file" class="form-control-file" id="vocabPdfFile" accept=".pdf">
                                    </div>
                                    <button class="btn btn-info btn-sm mt-2" onclick="uploadVocabPdf()" id="vocabPdfBtn">上传并创建词库</button>
                                    <span id="vocabPdfStatus" class="ml-2 small"></span>
                                </div>
                            </div>

                            <!-- 词库列表 -->
                            <div id="dictationBooksList">
                                <div class="text-center py-5">
                                    <div class="spinner-border text-success" role="status">
                                        <span class="sr-only">加载中...</span>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

<!-- 词库详情 Modal -->
<div class="modal fade" id="dictationBookModal" tabindex="-1" role="dialog">
    <div class="modal-dialog modal-lg" role="document">
        <div class="modal-content">
            <div class="modal-header">
                <h5 class="modal-title" id="bookDetailTitle">词库详情</h5>
                <button type="button" class="close" data-dismiss="modal">
                    <span>&times;</span>
                </button>
            </div>
            <div class="modal-body">
                <div class="mb-4">
                    <p class="text-muted mb-1" id="bookDetailDesc"></p>
                    <small class="text-muted">
                        <i class="fas fa-layer-group"></i> 共 <span id="bookDetailCount">0</span> 个单词
                        <span class="mx-2">|</span>
                        <i class="far fa-clock"></i> 创建于 <span id="bookDetailDate"></span>
                    </small>
                </div>

                <div class="table-responsive" style="max-height: 50vh; overflow-y: auto;">
                    <table class="table table-hover table-sm">
                        <thead class="thead-light">
                            <tr>
                                <th style="width: 60px;">#</th>
                                <th>单词</th>
                                <th>音标</th>
                                <th>释义</th>
                            </tr>
                        </thead>
                        <tbody id="bookWordsList">
                            <!-- Words will be loaded here -->
                        </tbody>
                    </table>
                </div>
            </div>
            <div class="modal-footer">
                <button type="button" class="btn btn-secondary" data-dismiss="modal">关闭</button>
            </div>
        </div>
    </div>
</div>

<script>
    let allMaterials = [];
    let allBooks = [];

    // 加载材料列表
    async function loadMaterials() {
        const typeFilter = document.getElementById('typeFilter').value;
        const searchInput = document.getElementById('searchInput').value;

        try {
            let url = '/api/materials?';
            if (typeFilter) url += `type=${typeFilter}&`;
            if (searchInput) url += `search=${encodeURIComponent(searchInput)}`;

            const response = await fetch(url, {
                credentials: 'include'
            });
            const data = await response.json();

            if (data.ok) {
                allMaterials = data.materials;
                renderMaterials(allMaterials);
            } else {
                showError('加载失败：' + (data.error || '未知错误'));
            }
        } catch (err) {
            showError('网络错误：' + err.message);
        }
    }

    // 加载听写词库列表
    async function loadDictationBooks() {
        try {
            const response = await fetch('/api/dictation/books', {
                credentials: 'include'
            });
            const data = await response.json();

            if (data.ok) {
                allBooks = data.books;
                renderDictationBooks(allBooks);
            } else {
                showError('加载词库失败：' + (data.error || '未知错误'));
            }
        } catch (err) {
            showError('网络错误：' + err.message);
        }
    }


    // 上传翻译词汇PDF
    async function uploadVocabPdf() {
        const fileInput = document.getElementById('vocabPdfFile');
        const titleInput = document.getElementById('vocabPdfTitle');
        const btn = document.getElementById('vocabPdfBtn');
        const status = document.getElementById('vocabPdfStatus');

        if (!fileInput.files.length) {
            alert('请先选择PDF文件');
            return;
        }

        btn.disabled = true;
        status.innerHTML = '<span class="text-info">正在解析上传中...</span>';

        const formData = new FormData();
        formData.append('file', fileInput.files[0]);
        if (titleInput.value.trim()) {
            formData.append('title', titleInput.value.trim());
        }

        try {
            const response = await fetch('/api/dictation/books/upload-vocab-pdf', {
                method: 'POST',
                body: formData,
                credentials: 'include'
            });
            const data = await response.json();

            if (data.ok) {
                status.innerHTML = `<span class="text-success">成功创建词库「${data.title}」，共 ${data.word_count} 个词条</span>`;
                loadDictationBooks();
                fileInput.value = '';
                titleInput.value = '';
            } else {
                status.innerHTML = `<span class="text-danger">失败: ${data.message || data.error}</span>`;
            }
        } catch (e) {
            status.innerHTML = `<span class="text-danger">上传失败: ${e.message}</span>`;
        } finally {
            btn.disabled = false;
        }
    }

    // 渲染听写词库列表
    function renderDictationBooks(books) {
        const container = document.getElementById('dictationBooksList');

        if (books.length === 0) {
            container.innerHTML = `
            <div class="text-center py-5 text-muted">
                <i class="fas fa-headphones fa-3x mb-3"></i>
                <p>暂无词库<br><small>点击"创建新材料"选择"听写词库"类型来创建</small></p>
            </div>
        `;
            return;
        }

        let html = '<div class="list-group">';
        books.forEach(b => {
            html += `
            <div class="list-group-item list-group-item-action">
                <div class="d-flex w-100 justify-content-between">
                    <h5 class="mb-1">
                        <span class="badge ${b.book_type === 'translation' ? 'badge-info' : 'badge-success'} mr-2">${b.book_type === 'translation' ? '🔤 翻译' : '🎧 听写'}</span>
                        ${b.title}
                    </h5>
                    <div>
                        <button class="btn btn-sm btn-outline-primary" onclick="viewDictationBook(${b.id})">
                            <i class="fas fa-eye"></i> 查看
                        </button>
                        <button class="btn btn-sm btn-outline-success" onclick="createDictationTask(${b.id})">
                            <i class="fas fa-paper-plane"></i> 发布任务
                        </button>
                        <button class="btn btn-sm btn-outline-danger" onclick="deleteDictationBook(${b.id})">
                            <i class="fas fa-trash"></i> 删除
                        </button>
                    </div>
                </div>
                <p class="mb-1 text-muted">${b.description || '暂无说明'}</p>
                <small>
                    <i class="fas fa-list-ol"></i> ${b.word_count} 词 | 
                    <i class="fas fa-calendar"></i> ${b.created_at ? b.created_at.split('T')[0] : ''}
                    ${b.creator ? ' | <i class="fas fa-user"></i> ' + b.creator : ''}
                </small>
            </div>
        `;
        });
        html += '</div>';

        container.innerHTML = html;
    }

    // 查看词库
    async function viewDictationBook(id) {
        try {
            const response = await fetch(`/api/dictation/books/${id}`, {
                credentials: 'include'
            });
            const data = await response.json();

            if (data.ok) {
                const book = data.book;
                const words = data.words;

                // Fill modal info
                $('#bookDetailTitle').text(book.title);
                $('#bookDetailDesc').text(book.description || '暂无描述');
                $('#bookDetailCount').text(book.word_count);
                $('#bookDetailDate').text(new Date(book.created_at).toLocaleDateString());

                // Fill table
                const tbody = $('#bookWordsList');
                tbody.empty();

                if (words.length === 0) {
                    tbody.append('<tr><td colspan="4" class="text-center text-muted">暂无单词</td></tr>');
                } else {
                    words.forEach((w, index) => {
                        const tr = `
                            <tr>
                                <td>${index + 1}</td>
                                <td><strong>${w.word}</strong></td>
                                <td class="text-muted font-italic">${w.phonetic || '-'}</td>
                                <td>${w.translation || '-'}</td>
                            </tr>
                        `;
                        tbody.append(tr);
                    });
                }

                // Show modal
                $('#dictationBookModal').modal('show');
            } else {
                showError('获取详情失败：' + (data.error || '未知错误'));
            }
        } catch (err) {
            showError('网络错误：' + err.message);
        }
    }

    // 从词库创建任务
    function createDictationTask(id) {
        window.location.href = `/tasks/create?dictation_book_id=${id}`;
    }

    // 删除词库
    async function deleteDictationBook(id) {
        if (!confirm('确定要删除这个词库吗？相关音频也会被删除。')) return;

        try {
            const response = await fetch(`/api/dictation/books/${id}`, {
                method: 'DELETE',
                credentials: 'include'
            });
            const data = await response.json();

            if (data.ok) {
                alert('删除成功！');
                loadDictationBooks();
            } else {
                showError('删除失败：' + (data.error || '未知错误'));
            }
        } catch (err) {
            showError('网络错误：' + err.message);
        }
    }

    // 渲染材料列表
    function renderMaterials(materials) {
        const container = document.getElementById('materialsList');

        if (materials.length === 0) {
            container.innerHTML = `
            <div class="text-center py-5 text-muted">
                <i class="fas fa-inbox fa-3x mb-3"></i>
                <p>暂无材料</p>
            </div>
        `;
            return;
        }

        const typeLabels = {
            'grammar': '语法',
            'translation': '翻译',
            'reading_vocab_choice': '阅读词汇选择',
            'ielts_reading_practice': '雅思阅读真题',
            'speaking': '口语',
            'writing': '写作'
        };

        const typeColors = {
            'grammar': 'primary',
            'translation': 'success',
            'reading_vocab_choice': 'warning',
            'ielts_reading_practice': 'info',
            'speaking': 'warning',
            'writing': 'info'
        };

        let html = '<div class="list-group">';
        materials.forEach(m => {
            html += `
            <div class="list-group-item list-group-item-action">
                <div class="d-flex w-100 justify-content-between">
                    <h5 class="mb-1">
                        <span class="badge badge-${typeColors[m.type] || 'secondary'} mr-2">
                            ${typeLabels[m.type] || m.type}
                        </span>
                        ${m.title}
                    </h5>
                    <div>
                        <button class="btn btn-sm btn-outline-primary" onclick="viewMaterial(${m.id})">
                            <i class="fas fa-eye"></i> 查看
                        </button>
                        <button class="btn btn-sm btn-outline-success" onclick="createTaskFromMaterial(${m.id})">
                            <i class="fas fa-paper-plane"></i> 发布任务
                        </button>
                        <button class="btn btn-sm btn-outline-warning" onclick="editMaterial(${m.id})">
                            <i class="fas fa-edit"></i> 编辑
                        </button>
                        <button class="btn btn-sm btn-outline-danger" onclick="deleteMaterial(${m.id})">
                            <i class="fas fa-trash"></i> 删除
                        </button>
                    </div>
                </div>
                <p class="mb-1 text-muted">${m.description || '暂无说明'}</p>
                <small>
                    <i class="fas fa-list-ol"></i> ${m.question_count} 题 | 
                    <i class="fas fa-calendar"></i> ${m.created_at}
                </small>
            </div>
        `;
        });
        html += '</div>';

        container.innerHTML = html;
    }

    // 筛选材料
    function filterMaterials() {
        loadMaterials();
    }

    // 查看材料详情
    function viewMaterial(id) {
        window.location.href = `/materials/${id}`;
    }

    // 编辑材料
    function editMaterial(id) {
        window.location.href = `/materials/${id}/edit`;
    }

    // 从材料创建任务
    function createTaskFromMaterial(id) {
        window.location.href = `/tasks/create?material_id=${id}`;
    }

    // 删除材料
    async function deleteMaterial(id) {
        if (!confirm('确定要删除这份材料吗？')) return;

        try {
            const response = await fetch(`/api/materials/${id}`, {
                method: 'DELETE',
                credentials: 'include'
            });
            const data = await response.json();

            if (data.ok) {
                alert('删除成功！');
                loadMaterials();
            } else {
                showError('删除失败：' + (data.error || '未知错误'));
            }
        } catch (err) {
            showError('网络错误：' + err.message);
        }
    }

    // 显示错误
    function showError(message) {
        alert(message);
    }

    // 页面加载时执行
    document.addEventListener('DOMContentLoaded', function () {
        loadMaterials();

        // Load dictation books when tab is clicked
        document.getElementById('dictation-tab').addEventListener('click', function () {
            loadDictationBooks();
        });
    });
</script>

<style>
    .list-group-item {
        transition: all 0.2s;
    }

    .list-group-item:hover {
        background-color: #f8f9fa;
        transform: translateX(5px);
    }

    .nav-tabs .nav-link {
        font-weight: 500;
    }

    .nav-tabs .nav-link.active {
        background-color: #fff;
        border-bottom-color: #fff;
    }
</style>
{% endblock %}
