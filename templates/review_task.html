{% extends "base.html" %}

{% block content_dashboard %}
<div class="review-container">
    <div class="review-header">
        <h2>批改任务: {{ task.student_name }} - {{ task.category }}</h2>
        <a href="/tasks" class="back-link">返回列表</a>
    </div>

    <div class="review-layout">
        <!-- Left: Image List -->
        <div class="image-list">
            <h3>学生提交</h3>
            {% for photo in evidence_photos %}
            <img src="{{ photo }}" class="thumb" onclick="loadImage('{{ photo }}')">
            {% else %}
            <p class="no-data">无图片</p>
            {% endfor %}
        </div>

        <!-- Center: Canvas -->
        <div style="flex:1; display:flex; flex-direction:column; overflow:hidden;">
            <div class="canvas-toolbar">
                <button type="button" onclick="setPenColor('red')" class="color-btn red active"></button>
                <button type="button" onclick="setPenColor('blue')" class="color-btn blue"></button>
                <button type="button" onclick="setPenColor('green')" class="color-btn green"></button>
                <span class="toolbar-sep"></span>
                <button type="button" onclick="zoomIn()" class="toolbar-btn">🔍+ 放大</button>
                <button type="button" onclick="zoomOut()" class="toolbar-btn">🔍- 缩小</button>
                <button type="button" onclick="zoomReset()" class="toolbar-btn">1:1 适配</button>
                <span class="toolbar-sep"></span>
                <button type="button" onclick="undoLast()" class="toolbar-btn">↩ 撤销</button>
                <button type="button" onclick="clearCanvas()" class="toolbar-btn">清除画布</button>
                <span id="zoomLevel" class="zoom-label">100%</span>
            </div>
            <div class="canvas-wrapper">
                <canvas id="reviewCanvas"></canvas>
                <div id="canvasPlaceholder">请点击左侧图片加载</div>
            </div>
        </div>

        <!-- Right: Feedback Form -->
        <div class="feedback-panel">
            <h3>反馈与评分</h3>

            <div class="form-group">
                <label>语音反馈</label>
                <div class="audio-recorder">
                    <button type="button" id="recordBtn" class="record-btn">按住录音</button>
                    <audio id="audioPreview" controls style="display:none; margin-top:10px; width:100%"></audio>
                    <div id="recordStatus" class="status-text"></div>
                </div>
            </div>

            <div class="form-group">
                <label>正确率 (0-100)</label>
                <input type="number" id="accuracy" value="{{ task.accuracy or '' }}" min="0" max="100" step="0.1">
            </div>

            <div class="form-group">
                <label>完成率 (0-100)</label>
                <input type="number" id="completionRate" value="{{ task.completion_rate or '' }}" min="0" max="100"
                    step="0.1">
            </div>

            <div class="form-group">
                <label>评语</label>
                <textarea id="note" rows="4">{{ task.note or '' }}</textarea>
            </div>

            <button type="button" id="submitBtn" class="submit-btn">提交批改</button>
        </div>
    </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/fabric.js/5.3.1/fabric.min.js"></script>
<style>
    .review-container {
        padding: 20px;
        height: calc(100vh - 60px);
        display: flex;
        flex-direction: column;
    }

    .review-header {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 20px;
    }

    .review-layout {
        display: flex;
        gap: 20px;
        flex: 1;
        overflow: hidden;
    }

    .image-list {
        width: 150px;
        display: flex;
        flex-direction: column;
        gap: 10px;
        overflow-y: auto;
        background: #fff;
        padding: 10px;
        border-radius: 8px;
    }

    .thumb {
        width: 100%;
        height: 100px;
        object-fit: cover;
        cursor: pointer;
        border: 2px solid transparent;
        border-radius: 4px;
    }

    .thumb:hover {
        border-color: #277C78;
    }

    .canvas-wrapper {
        flex: 1;
        background: #e0e0e0;
        display: flex;
        justify-content: center;
        align-items: center;
        border-radius: 8px;
        position: relative;
        overflow: hidden;
    }

    #canvasPlaceholder {
        color: #666;
    }

    .feedback-panel {
        width: 300px;
        background: #fff;
        padding: 20px;
        border-radius: 8px;
        display: flex;
        flex-direction: column;
        gap: 15px;
        overflow-y: auto;
    }

    .form-group label {
        display: block;
        margin-bottom: 5px;
        font-weight: bold;
        color: #333;
    }

    .form-group input,
    .form-group textarea {
        width: 100%;
        padding: 8px;
        border: 1px solid #ddd;
        border-radius: 4px;
    }

    .record-btn {
        width: 100%;
        padding: 10px;
        background: #f0f0f0;
        border: 1px solid #ccc;
        border-radius: 4px;
        cursor: pointer;
        user-select: none;
    }

    .record-btn.recording {
        background: #ff4d4f;
        color: white;
        border-color: #ff4d4f;
    }

    .submit-btn {
        margin-top: auto;
        padding: 12px;
        background: #277C78;
        color: white;
        border: none;
        border-radius: 4px;
        font-size: 16px;
        cursor: pointer;
    }

    .canvas-toolbar {
        display: flex;
        align-items: center;
        gap: 8px;
        padding: 8px 12px;
        background: #fff;
        border-radius: 8px 8px 0 0;
        border-bottom: 1px solid #e0e0e0;
    }

    .color-btn {
        width: 26px;
        height: 26px;
        border-radius: 50%;
        border: 2px solid #fff;
        box-shadow: 0 0 2px rgba(0, 0, 0, 0.3);
        cursor: pointer;
    }

    .color-btn.active {
        transform: scale(1.2);
        border-color: #333;
    }

    .color-btn.red {
        background: red;
    }

    .color-btn.blue {
        background: blue;
    }

    .color-btn.green {
        background: green;
    }

    .toolbar-btn {
        padding: 5px 12px;
        font-size: 13px;
        cursor: pointer;
        background: #f5f5f5;
        border: 1px solid #ddd;
        border-radius: 4px;
        color: #333;
    }

    .toolbar-btn:hover {
        background: #e8e8e8;
    }

    .toolbar-sep {
        width: 1px;
        height: 20px;
        background: #ddd;
        margin: 0 4px;
    }

    .zoom-label {
        font-size: 12px;
        color: #666;
        margin-left: auto;
    }

    .thumb.active {
        border-color: #277C78;
        box-shadow: 0 0 6px rgba(39, 124, 120, 0.5);
    }
</style>

<script>
    let canvas;
    let audioBlob = null;
    let mediaRecorder;
    let audioChunks = [];

    // Per-image annotation storage: url -> { objects: [...], zoom, vpTransform }
    const imageAnnotations = {};
    let currentImageUrl = null;
    let currentZoom = 1;

    document.addEventListener('DOMContentLoaded', () => {
        // Init Fabric Canvas
        const wrapper = document.querySelector('.canvas-wrapper');
        const width = wrapper.clientWidth;
        const height = wrapper.clientHeight;

        const canvasEl = document.getElementById('reviewCanvas');
        canvasEl.width = width;
        canvasEl.height = height;

        canvas = new fabric.Canvas('reviewCanvas', {
            isDrawingMode: true,
            width: width,
            height: height
        });

        canvas.freeDrawingBrush.width = 3;
        canvas.freeDrawingBrush.color = 'red';

        // Mouse wheel zoom
        canvas.on('mouse:wheel', function (opt) {
            const delta = opt.e.deltaY;
            let zoom = canvas.getZoom();
            zoom *= 0.999 ** delta;
            zoom = Math.min(Math.max(0.2, zoom), 5);
            canvas.zoomToPoint({ x: opt.e.offsetX, y: opt.e.offsetY }, zoom);
            currentZoom = zoom;
            updateZoomLabel();
            opt.e.preventDefault();
            opt.e.stopPropagation();
        });

        // Pan with middle mouse button or Alt+drag
        let isPanning = false;
        let lastPanX, lastPanY;

        canvas.on('mouse:down', function (opt) {
            if (opt.e.altKey || opt.e.button === 1) {
                isPanning = true;
                canvas.isDrawingMode = false;
                canvas.selection = false;
                lastPanX = opt.e.clientX;
                lastPanY = opt.e.clientY;
                opt.e.preventDefault();
            }
        });
        canvas.on('mouse:move', function (opt) {
            if (isPanning) {
                const vpt = canvas.viewportTransform;
                vpt[4] += opt.e.clientX - lastPanX;
                vpt[5] += opt.e.clientY - lastPanY;
                lastPanX = opt.e.clientX;
                lastPanY = opt.e.clientY;
                canvas.requestRenderAll();
            }
        });
        canvas.on('mouse:up', function () {
            if (isPanning) {
                isPanning = false;
                canvas.isDrawingMode = true;
                canvas.selection = false;
            }
        });

        // Audio Recording
        const recordBtn = document.getElementById('recordBtn');
        const audioPreview = document.getElementById('audioPreview');
        const statusText = document.getElementById('recordStatus');

        if (navigator.mediaDevices && navigator.mediaDevices.getUserMedia) {
            recordBtn.addEventListener('mousedown', startRecording);
            recordBtn.addEventListener('mouseup', stopRecording);
            recordBtn.addEventListener('mouseleave', stopRecording);
            recordBtn.addEventListener('touchstart', (e) => { e.preventDefault(); startRecording(); });
            recordBtn.addEventListener('touchend', (e) => { e.preventDefault(); stopRecording(); });
        } else {
            statusText.textContent = "您的浏览器不支持录音";
            recordBtn.disabled = true;
        }

        function startRecording() {
            if (mediaRecorder && mediaRecorder.state === 'recording') return;
            navigator.mediaDevices.getUserMedia({ audio: true })
                .then(stream => {
                    mediaRecorder = new MediaRecorder(stream);
                    audioChunks = [];
                    mediaRecorder.ondataavailable = e => audioChunks.push(e.data);
                    mediaRecorder.onstop = () => {
                        audioBlob = new Blob(audioChunks, { type: 'audio/webm' });
                        audioPreview.src = URL.createObjectURL(audioBlob);
                        audioPreview.style.display = 'block';
                        statusText.textContent = "录音已完成";
                    };
                    mediaRecorder.start();
                    recordBtn.classList.add('recording');
                    recordBtn.textContent = "松开结束";
                    statusText.textContent = "录音中...";
                })
                .catch(err => {
                    console.error(err);
                    statusText.textContent = "无法访问麦克风";
                });
        }

        function stopRecording() {
            if (mediaRecorder && mediaRecorder.state === 'recording') {
                mediaRecorder.stop();
                recordBtn.classList.remove('recording');
                recordBtn.textContent = "按住录音";
                mediaRecorder.stream.getTracks().forEach(track => track.stop());
            }
        }

        // Submit — save all annotated images
        document.getElementById('submitBtn').addEventListener('click', async () => {
            // Save current image annotations first
            saveCurrentAnnotations();

            const formData = new FormData();

            // Generate annotated images for ALL images that have annotations
            const allUrls = Array.from(document.querySelectorAll('.thumb')).map(t => t.src);
            let hasAnnotation = false;

            for (let i = 0; i < allUrls.length; i++) {
                const url = allUrls[i];
                const ann = imageAnnotations[url];
                if (ann && ann.objects && ann.objects.length > 0) {
                    hasAnnotation = true;
                    // Render this image + its annotations to a temp canvas
                    const blob = await renderAnnotatedImage(url, ann);
                    if (blob) {
                        formData.append('feedback_image', blob, `feedback_${i}.png`);
                    }
                }
            }

            // If no annotations on any image but current canvas has background, still send it
            if (!hasAnnotation && canvas.backgroundImage) {
                const dataUrl = canvas.toDataURL({ format: 'png' });
                const res = await fetch(dataUrl);
                const blob = await res.blob();
                formData.append('feedback_image', blob, 'feedback.png');
            }

            // Audio
            if (audioBlob) {
                formData.append('feedback_audio', audioBlob, 'feedback.webm');
            }

            // Text data
            formData.append('accuracy', document.getElementById('accuracy').value);
            formData.append('completion_rate', document.getElementById('completionRate').value);
            formData.append('note', document.getElementById('note').value);

            const btn = document.getElementById('submitBtn');
            btn.disabled = true;
            btn.textContent = "提交中...";

            try {
                const resp = await fetch('/api/tasks/{{ task.id }}/review', {
                    method: 'POST',
                    body: formData
                });
                const result = await resp.json();
                if (result.ok) {
                    alert('批改完成！');
                    window.location.href = '/tasks';
                } else {
                    alert('提交失败: ' + (result.error || '未知错误'));
                    btn.disabled = false;
                    btn.textContent = "提交批改";
                }
            } catch (err) {
                console.error(err);
                alert('网络错误');
                btn.disabled = false;
                btn.textContent = "提交批改";
            }
        });

        // Auto-load first image
        const firstThumb = document.querySelector('.thumb');
        if (firstThumb) {
            firstThumb.click();
        }
    });

    // Save annotations for the current image
    function saveCurrentAnnotations() {
        if (!currentImageUrl) return;
        const objects = canvas.getObjects().map(obj => obj.toJSON());
        imageAnnotations[currentImageUrl] = {
            objects: objects,
            zoom: canvas.getZoom(),
            vpTransform: canvas.viewportTransform.slice()
        };
    }

    // Render a single annotated image to a blob (for submission)
    function renderAnnotatedImage(url, ann) {
        return new Promise((resolve) => {
            fabric.Image.fromURL(url, function (img) {
                const tmpCanvas = new fabric.StaticCanvas(null, {
                    width: canvas.width,
                    height: canvas.height
                });

                // Fit image same way as loadImage
                const cw = tmpCanvas.width, ch = tmpCanvas.height;
                const imgRatio = img.width / img.height;
                const cRatio = cw / ch;
                if (imgRatio > cRatio) { img.scaleToWidth(cw); } else { img.scaleToHeight(ch); }

                tmpCanvas.setBackgroundImage(img, () => {
                    // Add all annotation objects
                    fabric.util.enlivenObjects(ann.objects, function (objs) {
                        objs.forEach(o => tmpCanvas.add(o));
                        tmpCanvas.renderAll();
                        const dataUrl = tmpCanvas.toDataURL({ format: 'png' });
                        fetch(dataUrl).then(r => r.blob()).then(b => resolve(b));
                    });
                }, {
                    originX: 'left', originY: 'top',
                    left: (cw - img.getScaledWidth()) / 2,
                    top: (ch - img.getScaledHeight()) / 2
                });
            }, { crossOrigin: 'anonymous' });
        });
    }

    function loadImage(url) {
        // Save annotations of the image we're leaving
        saveCurrentAnnotations();

        document.getElementById('canvasPlaceholder').style.display = 'none';

        // Highlight active thumbnail
        document.querySelectorAll('.thumb').forEach(t => t.classList.remove('active'));
        document.querySelectorAll('.thumb').forEach(t => {
            if (t.src === url || t.getAttribute('onclick').includes(url)) t.classList.add('active');
        });

        currentImageUrl = url;

        fabric.Image.fromURL(url, function (img) {
            // Reset zoom and pan
            canvas.setViewportTransform([1, 0, 0, 1, 0, 0]);
            currentZoom = 1;
            updateZoomLabel();

            // Scale image to fit canvas
            const cw = canvas.width, ch = canvas.height;
            const imgRatio = img.width / img.height;
            const cRatio = cw / ch;
            if (imgRatio > cRatio) { img.scaleToWidth(cw); } else { img.scaleToHeight(ch); }

            // Clear canvas
            canvas.clear();

            // Set background image
            canvas.setBackgroundImage(img, () => {
                // Restore saved annotations if any
                const saved = imageAnnotations[url];
                if (saved && saved.objects && saved.objects.length > 0) {
                    fabric.util.enlivenObjects(saved.objects, function (objs) {
                        objs.forEach(o => canvas.add(o));
                        // Restore zoom/pan state
                        if (saved.zoom) {
                            canvas.setZoom(saved.zoom);
                            currentZoom = saved.zoom;
                            updateZoomLabel();
                        }
                        if (saved.vpTransform) {
                            canvas.setViewportTransform(saved.vpTransform);
                        }
                        canvas.renderAll();
                    });
                } else {
                    canvas.renderAll();
                }
            }, {
                originX: 'left', originY: 'top',
                left: (cw - img.getScaledWidth()) / 2,
                top: (ch - img.getScaledHeight()) / 2
            });
        }, { crossOrigin: 'anonymous' });
    }

    function updateZoomLabel() {
        const el = document.getElementById('zoomLevel');
        if (el) el.textContent = Math.round(currentZoom * 100) + '%';
    }

    function zoomIn() {
        currentZoom = Math.min(currentZoom * 1.3, 5);
        canvas.zoomToPoint({ x: canvas.width / 2, y: canvas.height / 2 }, currentZoom);
        updateZoomLabel();
    }

    function zoomOut() {
        currentZoom = Math.max(currentZoom / 1.3, 0.2);
        canvas.zoomToPoint({ x: canvas.width / 2, y: canvas.height / 2 }, currentZoom);
        updateZoomLabel();
    }

    function zoomReset() {
        currentZoom = 1;
        canvas.setViewportTransform([1, 0, 0, 1, 0, 0]);
        canvas.setZoom(1);
        updateZoomLabel();
    }

    function setPenColor(color) {
        canvas.freeDrawingBrush.color = color;
        document.querySelectorAll('.color-btn').forEach(btn => btn.classList.remove('active'));
        document.querySelector(`.color-btn.${color}`).classList.add('active');
    }

    function undoLast() {
        const objects = canvas.getObjects();
        if (objects.length > 0) {
            canvas.remove(objects[objects.length - 1]);
            canvas.renderAll();
        }
    }

    function clearCanvas() {
        const bg = canvas.backgroundImage;
        canvas.clear();
        if (bg) {
            canvas.setBackgroundImage(bg, canvas.renderAll.bind(canvas));
        }
    }
</script>
{% endblock %}
